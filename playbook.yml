---
- name: Install TRANA
  hosts: localhost
  vars:
    trana_path: "/data/trana/trana"
    report_path: "/data/trana/16s-report"
    install_path: "/data/trana/install"
  tasks:
  - name: Update apt cache
    apt:
      update_cache=yes
      cache_valid_time=7200
    become: yes

  - name: Install APT packages
    apt: name=singularity-container
    become: yes

  - name: Clone the TRANA repo
    git:
        repo: https://github.com/genomic-medicine-sweden/TRANA.git
        dest: "{{ trana_path }}"
        clone: yes
        force: yes
        version: hotfix-20251114-fix-nanoplot-image

  - name: Run TRANA install script
    make:
        chdir: "{{ trana_path }}"
        target: install

  - name: Download pixi
    get_url:
        url: https://github.com/prefix-dev/pixi/releases/download/v0.59.0/pixi-x86_64-unknown-linux-musl.tar.gz
        dest: "{{ install_path }}"

  - name: Create bin folder
    ansible.builtin.file:
        path: /data/trana/bin
        state: directory

  - name: Add bin folder to PATH
    lineinfile:
        path: /home/grid/.bashrc
        line: "PATH=/data/trana/bin:$PATH"

  - name: Unarchive pixi
    unarchive:
        src: pixi-x86_64-unknown-linux-musl.tar.gz
        dest: "/data/trana/bin"

  - name: Create pixi environment
    shell: |
        cd "{{ trana_path }}"
        /data/trana/bin/pixi init -q --no-progress --format pixi "{{ trana_path }}"
    args:
        creates: "{{ trana_path }}/pixi.toml"

  - name: Add bioconda channel to pixi environment
    lineinfile:
        path: "{{ trana_path }}/pixi.toml"
        regexp: "^channels\ "
        line: 'channels = ["conda-forge", "bioconda"]'

  - name: Install Nextflow via Pixi
    shell: |
        /data/trana/bin/pixi add --manifest-path "{{ trana_path }}/pixi.toml" nextflow
    args:
        creates: "{{ trana_path }}/.pixi/envs/default/bin/nextflow"

  - name: Download the bartender GUI
    get_url:
        url: https://github.com/samuell/bartender/releases/download/v0.2.1/bartender-v0.2.1-linux-amd64.tar.gz
        dest: "{{ install_path }}"

  - name: Unarchive bartender
    unarchive:
        src: bartender-v0.2.1-linux-amd64.tar.gz
        dest: "/data/trana/bin"

  - name: Download ontime
    get_url:
        url: https://github.com/mbhall88/ontime/releases/download/0.3.1/ontime-0.3.1-x86_64-unknown-linux-musl.tar.gz
        dest: "{{ install_path }}"

  - name: Unarchive ontime
    unarchive:
        src: ontime-0.3.1-x86_64-unknown-linux-musl.tar.gz
        dest: "{{ install_path }}"

  - name: Move ontime to destination
    copy:
        src: "{{ install_path }}/ontime-0.3.1-x86_64-unknown-linux-musl/ontime"
        dest: "/data/trana/bin"
        mode: "a=rx"

  - name: Download 16S Report
    git:
        repo: https://github.com/samuell/tranavy-fork.git
        dest: "{{ report_path }}"
        clone: yes
        force: yes
        version: dev
